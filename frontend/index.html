<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neferine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="alternate" type="application/rss+xml" title="Neferine - Blog RSS Feed" href="rss.xml">
  <link rel="icon" href="https://i.pinimg.com/736x/d5/28/b7/d528b74880bc1056f0854916e26ba32d.jpg" type="image/jpeg">
</head>
<body>

  <!-- Mobile header -->
  <header class="mobile-header">
    <span class="mobile-wordmark">Neferine</span>
    <div class="mobile-header-right">
      <button class="mobile-theme-toggle theme-toggle" aria-label="Toggle theme">Dark</button>
      <button class="burger" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-brand">
          <p class="brand-name">Neferine</p>
          <p class="brand-sub">Prompt Engineering</p>
        </div>
        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a href="/about"    class="nav-link" data-route="about">About</a></li>
            <li><a href="/projects" class="nav-link" data-route="projects">Projects</a></li>
            <li><a href="/blog"     class="nav-link" data-route="blog">Blog</a></li>
            <li><a href="/contact"  class="nav-link" data-route="contact">Contact</a></li>
            <li><a href="/colophon" class="nav-link" data-route="colophon">Colophon</a></li>
            <li><a href="/rss.xml"  class="rss-nav-link" target="_blank">RSS</a></li>
          </ul>
        </nav>
        <div class="sidebar-foot">
          <div class="sidebar-foot-inner desktop-only">
            <div>
              <p class="now-label">Now</p>
              <p class="now-line">Building this portfolio<br>in Rust + WASM</p>
            </div>
            <button class="theme-toggle" aria-label="Toggle theme">Dark</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN — section content is injected here -->
    <main class="main" id="main-content">
      <!-- Router injects section partials here -->
    </main>
  </div>

  <script src="/main.js"></script>
</body>
</html>
